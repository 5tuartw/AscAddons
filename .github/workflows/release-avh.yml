name: Release AscensionVanityHelper

on:
  push:
    tags:
      - 'avh-v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/avh-v}" >> $GITHUB_OUTPUT

      - name: Package addon
        run: |
          mkdir -p release
          cp -r addons/AscensionVanityHelper release/AscensionVanityHelper
          # Keep README.md, drop other markdown/release helper files from package.
          find release/AscensionVanityHelper -name "*.md" ! -name "README.md" -delete
          find release/AscensionVanityHelper -name "RELEASE_*" -delete
          cd release
          zip -r AscensionVanityHelper-${{ steps.version.outputs.VERSION }}.zip AscensionVanityHelper/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/AscensionVanityHelper-${{ steps.version.outputs.VERSION }}.zip
          name: Ascension Vanity Helper v${{ steps.version.outputs.VERSION }}
          body: |
            # Ascension Vanity Helper v${{ steps.version.outputs.VERSION }}

            Manage and summon vanity collection items with lightweight controls.

            ## Installation
            1. Download `AscensionVanityHelper-${{ steps.version.outputs.VERSION }}.zip`
            2. Extract to `World of Warcraft/Interface/AddOns/`
            3. Restart WoW or type `/reload`
            4. Type `/avh` to configure

            ## Features
            - Quick set delivery and summon helpers
            - Per-character preferences and cleanup helpers
            - Minimal UI focused on day-to-day use

            See [README](https://github.com/5tuartw/AscAddons/blob/main/addons/AscensionVanityHelper/README.md) for full documentation.
          draft: false
          prerelease: false

      - name: Prune older AVH releases
        uses: actions/github-script@v7
        with:
          script: |
            const prefix = 'avh-v';
            const currentTag = context.ref.replace('refs/tags/', '');
            const { owner, repo } = context.repo;
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            for (const release of releases) {
              if (release.tag_name === currentTag || !release.tag_name.startsWith(prefix)) {
                continue;
              }

              core.info(`Deleting older release ${release.tag_name}`);
              await github.rest.repos.deleteRelease({
                owner,
                repo,
                release_id: release.id,
              });
            }
