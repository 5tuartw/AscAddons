name: Release Ascension Prompt Squelcher

"on":
  push:
    tags:
      - 'aps-v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/aps-v}" >> $GITHUB_OUTPUT

      - name: Package addon
        run: |
          mkdir -p release
          cp -r addons/AscensionPromptSquelcher release/AscensionPromptSquelcher
          cd release
          zip -r AscensionPromptSquelcher-${{ steps.version.outputs.VERSION }}.zip AscensionPromptSquelcher/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/AscensionPromptSquelcher-${{ steps.version.outputs.VERSION }}.zip
          name: Ascension Prompt Squelcher v${{ steps.version.outputs.VERSION }}
          body: |
            # Ascension Prompt Squelcher v${{ steps.version.outputs.VERSION }}

            Auto-confirms selected loot, roll, deletion, and appearance prompts on Ascension.

            ## Installation
            1. Download `AscensionPromptSquelcher-${{ steps.version.outputs.VERSION }}.zip`
            2. Extract to `World of Warcraft/Interface/AddOns/`
            3. Restart WoW or type `/reload`
            4. Type `/aps` to configure

            ## Features
            - Auto-confirm bind-on-pickup loot prompts
            - Auto-confirm bind-on-pickup and disenchant roll prompts
            - Optional Ctrl+Alt+LeftClick bag-item deletion flow
            - Auto-confirm destroy, rare-delete, appearance, and abandon-quest prompts

            See [README](https://github.com/5tuartw/AscAddons/blob/main/addons/AscensionPromptSquelcher/README.md) for full documentation.
          draft: false
          prerelease: false

      - name: Prune older APS releases
        uses: actions/github-script@v7
        with:
          script: |
            const prefix = 'aps-v';
            const currentTag = context.ref.replace('refs/tags/', '');
            const { owner, repo } = context.repo;
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            for (const release of releases) {
              if (release.tag_name === currentTag || !release.tag_name.startsWith(prefix)) {
                continue;
              }

              core.info(`Deleting older release ${release.tag_name}`);
              await github.rest.repos.deleteRelease({
                owner,
                repo,
                release_id: release.id,
              });
            }