name: Build Addon Zips

on:
  push:
    branches: [ main, master ]
    tags: 
      - 'v*'
      - '!avh-v*'
      - '!mestats-v*'
      - '!wrc-v*'
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create a release
      actions: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up zip
        run: sudo apt-get update && sudo apt-get install -y zip
      - name: Package addons
        run: |
          set -euo pipefail
          mkdir -p dist

          # Package each addon directory as its own zip at the archive root.
          found=0
          for addon_dir in addons/*; do
            if [ -d "$addon_dir" ]; then
              found=1
              addon_name=$(basename "$addon_dir")
              (cd addons && zip -r "../dist/${addon_name}.zip" "$addon_name")
            fi
          done

          if [ "$found" -eq 0 ]; then
            echo "No addon directories found under addons/."
            exit 1
          fi
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: addon-zips
          path: dist/*.zip
      - name: Create release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
            files: dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # If this still fails with permissions, ensure the workflow has write permission in repo settings

      - name: Prune older generic releases
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/github-script@v7
        with:
          script: |
            const prefix = 'v';
            const currentTag = context.ref.replace('refs/tags/', '');
            const { owner, repo } = context.repo;
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            for (const release of releases) {
              if (release.tag_name === currentTag || !release.tag_name.startsWith(prefix)) {
                continue;
              }

              core.info(`Deleting older release ${release.tag_name}`);
              await github.rest.repos.deleteRelease({
                owner,
                repo,
                release_id: release.id,
              });
            }
